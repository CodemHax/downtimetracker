<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Downtime Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container centered">
        <div class="auth-panel">
            <h1>Create Account</h1>
            <p>Start monitoring your websites today</p>
            
            <form id="registerForm" class="auth-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" minlength="6" required>
                </div>
                <button type="submit" class="btn primary full-width">Sign Up</button>
            </form>
            <p id="authMessage" class="message"></p>
            
        <div class="auth-links">
            <p>Already have an account? <a href="./login.html">Login</a></p>
        </div>
    </div>
</div>

<script src="/config.js"></script>
<script type="module" src="/js/register.js"></script>
</body>
</html>
